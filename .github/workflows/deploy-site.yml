# Build + publish the hub site to GitHub Pages on every push to main.
#
# This is what keeps the /guide knowledge base honest: /guide/toolkit and
# /guide/setup are GENERATED at build time from the plugin source and
# ONBOARDING.md — so the same push that ships a spoke-kit change also
# republishes the pages documenting it. No "remember to deploy" step.
#
# Publishes to the gh-pages branch (the existing Pages source), same output
# as the local `npm run deploy`.
name: Deploy site

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: deploy-site
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: apps/site/dist
